<div class = "content-box" *ngFor="let listing of fakeMyListings">
  <h3>{{ listing.name }}</h3>
  <p>{{ listing.description }}</p>
  <p>${{ listing.price }}</p>
  <div class="buttons-container">
    <a [routerLink] = "['/edit-listing', listing.id]">
        <button>Edit</button>
    </a>
    <button (click)="deleteListing(listing.id)">Delete</button>
  </div>
</div>
<a [routerLink] = "['/new-listing']">
    <button>New Listing</button>
</a>
